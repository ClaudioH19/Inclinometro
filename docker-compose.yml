services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: clinostat-mqtt
    ports:
      - "${MQTT_PUBLIC_PORT}:1883"
    volumes:
      - ./docker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  consumer:
    build: ./server
    container_name: clinostat-consumer
    command: python consumer.py
    depends_on:
      - mqtt
    env_file:
      - .env
    volumes:
      - ./server/data:/app/data

  data-api:
    build: ./server
    container_name: clinostat-data-api
    command: python data_api.py
    depends_on:
      - consumer
    env_file:
      - .env
    ports:
      - "${DATA_API_PORT}:8001"
    volumes:
      - ./server/data:/app/data

  dashboard:
    build: ./server
    container_name: clinostat-dashboard
    command: python api.py
    depends_on:
      - data-api
    env_file:
      - .env
    ports:
      - "${DASHBOARD_PORT}:8000"
    volumes:
      - ./server/data:/app/data
